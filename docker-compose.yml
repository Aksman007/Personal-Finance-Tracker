services:
  postgres:
    image: postgres:16-alpine
    container_name: fintrack-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: fintrack
      POSTGRES_PASSWORD: fintrack_secret
      POSTGRES_DB: fintrack_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack -d fintrack_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fintrack-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
